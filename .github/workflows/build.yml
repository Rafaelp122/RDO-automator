name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Using a stable version for build
        
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.ps1 | iex
      
    - name: Install dependencies
      run: uv sync
      
    - name: Build Executable
      run: |
        uv run python build_exe.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RDO_Automator-Windows
        path: dist/RDO_Automator/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: RDO_Automator-Windows
          path: RDO_Automator
          
      - name: Zip Release
        run: zip -r RDO_Automator_Windows.zip RDO_Automator/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: RDO_Automator_Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
